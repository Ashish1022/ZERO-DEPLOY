version: "3.9"

services:
  # ─── API Server ──────────────────────────────────────────────────────────────
  api-server:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
    ports:
      - "9000:9000"
    env_file: .env
    environment:
      PORT: 9000
    depends_on:
      - kafka
    restart: unless-stopped

  # ─── S3 Reverse Proxy ────────────────────────────────────────────────────────
  s3-reverse-proxy:
    build:
      context: .
      dockerfile: apps/s3-reverse-proxy-server/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      PORT: 8000
    restart: unless-stopped

  # ─── Frontend ────────────────────────────────────────────────────────────────
  zero:
    build:
      context: .
      dockerfile: apps/zero/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_SERVER_URL: http://localhost:9000
    restart: unless-stopped

  # ─── Kafka (KRaft mode — no Zookeeper) ───────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    restart: unless-stopped

  # ─── ClickHouse (log storage) ────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native (conflicts with api-server; bind to different host port if needed)
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

volumes:
  kafka_data:
  clickhouse_data:
